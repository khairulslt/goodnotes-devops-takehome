name: pr-ci-smoke

on:
  pull_request:
    branches:
      - "**"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Smoke - show context
        run: |
          echo "✅ CI is running for a Pull Request"
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Workflow: $GITHUB_WORKFLOW"
          echo "Run ID: $GITHUB_RUN_ID"
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"
          echo ""
          echo "Files at repo root:"
          ls -la
